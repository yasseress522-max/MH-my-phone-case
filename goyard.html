<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maison Goyard Paris Collection | My MH phone case</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=700;900&family=Playfair+Display:ital,wght=0,500;0,700;1,600&family=Plus+Jakarta+Sans:wght=600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ⚜️ ثيم فرنسي خالص مستوحى بالكامل من تراث صناديق جويارد باريس 1853 ⚜️ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f1ede2;
            background-image: 
                radial-gradient(at 0% 100%, rgba(223, 170, 52, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(17, 24, 21, 0.06) 0px, transparent 50%),
                linear-gradient(180deg, #f9f7f2 0%, #e6dfcf 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1a1f1c;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 5%;
            background: rgba(249, 247, 242, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid #dfaa34;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #c5a059;
        }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 16px;
            font-weight: 900;
            color: #111815;
            letter-spacing: 2px;
        }

        .back-btn {
            color: #111815;
            text-decoration: none;
            font-size: 11px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 0px;
            background: #ffffff;
            border: 1px solid #111815;
            transition: 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-btn:hover {
            color: #ffffff;
            background: #111815;
            border-color: #dfaa34;
        }

        .hero-folder {
            background: linear-gradient(135deg, #111815 0%, #1e2521 100%);
            color: #ffffff;
            padding: 60px 6%;
            text-align: center;
            border-bottom: 6px double #dfaa34;
            margin-bottom: 45px;
            position: relative;
            overflow: hidden;
        }

        .hero-folder::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#dfaa34 0.75px, transparent 0.75px);
            background-size: 15px 15px;
            opacity: 0.07;
            pointer-events: none;
        }

        .promo-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #dfaa34;
            color: #111815;
            padding: 5px 14px;
            font-family: 'Cinzel', serif;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(223, 170, 52, 0.2);
        }

        .hero-folder h2 {
            font-family: 'Cinzel', serif;
            font-size: 2.3rem;
            font-weight: 900;
            margin-bottom: 14px;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .hero-folder p {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            color: #d1d5d2;
            max-width: 650px;
            margin: 0 auto;
            line-height: 1.7;
            font-style: italic;
        }

        .hero-folder p strong {
            color: #dfaa34;
            font-style: normal;
            font-weight: 700;
            border-bottom: 1px dotted #dfaa34;
        }

        main {
            flex: 1;
            padding: 0 5% 60px 5%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .single-product-container {
            width: 100%;
            max-width: 480px;
        }

        .product-card {
            background: #ffffff;
            border: 1px solid #d4ccb9;
            border-radius: 0px;
            padding: 26px;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 50px rgba(17, 24, 21, 0.05);
            position: relative;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 40px; height: 4px;
            background: #dfaa34;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 70px rgba(17, 24, 21, 0.12);
            border-color: #111815;
        }

        .img-container {
            width: 100%;
            height: 410px;
            border-radius: 0px;
            overflow: hidden;
            background: #faf8f5;
            margin-bottom: 22px;
            position: relative;
            cursor: zoom-in;
            border: 1px solid #e6dfcf;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .img-container:hover img {
            transform: scale(1.04);
        }

        .product-info {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .product-sku {
            font-family: 'Cinzel', serif;
            font-size: 10px;
            color: #8c8575;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 23px;
            font-weight: 700;
            color: #111815;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .product-price {
            font-family: 'Cinzel', serif;
            font-size: 19px;
            font-weight: 900;
            color: #dfaa34;
            margin-bottom: 22px;
            letter-spacing: 0.5px;
        }

        .color-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            background: #faf8f5;
            padding: 12px;
            border: 1px solid #e6dfcf;
        }

        .color-dot {
            width: 34px;
            height: 34px;
            border-radius: 0px;
            cursor: pointer;
            border: 2px solid #ffffff;
            box-shadow: 0 0 0 1px #8c8575;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .color-dot:hover {
            transform: scale(1.08);
        }

        .color-dot.active {
            box-shadow: 0 0 0 2px #111815;
            transform: scale(1.1);
            border-color: #dfaa34;
        }

        .model-select-container {
            margin-bottom: 20px;
            position: relative;
        }

        .model-select {
            width: 100%;
            padding: 15px 16px;
            background: #ffffff;
            border: 1px solid #111815;
            border-radius: 0px;
            color: #111815;
            font-size: 13px;
            font-weight: 700;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }

        .model-select:focus {
            border-color: #dfaa34;
            background: #faf8f5;
        }

        .model-select-container::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #111815;
            pointer-events: none;
            font-size: 14px;
        }

        .order-btn {
            background: #111815;
            color: #ffffff;
            border: 1px solid #dfaa34;
            text-decoration: none;
            padding: 15px;
            border-radius: 0px;
            font-family: 'Cinzel', serif;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
            cursor: pointer;
        }

        .order-btn:hover {
            background: #dfaa34;
            color: #111815;
            box-shadow: 0 10px 25px rgba(223, 170, 52, 0.3);
            border-color: #111815;
        }

        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(17, 24, 21, 0.98); 
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .lightbox-overlay.active { opacity: 1; pointer-events: auto; }

        .lightbox-container {
            position: relative;
            max-width: 95%;
            max-height: 85vh;
            display: flex;
            transform: scale(0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lightbox-overlay.active .lightbox-container { transform: scale(1); }

        .lightbox-img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 0px;
            object-fit: contain;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.6);
            border: 2px solid #dfaa34;
        }

        .lightbox-close {
            position: absolute;
            top: -55px;
            right: 0;
            background: #dfaa34;
            color: #111815;
            border: none;
            width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .lightbox-close:hover {
            background: #ffffff;
        }

        .cart-floating-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            border-radius: 0px;
            background: #111815;
            color: #dfaa34;
            border: 1px solid #dfaa34;
            outline: none;
            cursor: pointer;
            font-size: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 25px rgba(17, 24, 21, 0.2);
            z-index: 99;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cart-floating-btn:hover {
            transform: scale(1.05);
            background: #dfaa34;
            color: #111815;
        }

        .cart-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #dfaa34;
            color: #111815;
            font-size: 11px;
            font-weight: 800;
            width: 22px;
            height: 22px;
            border-radius: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #111815;
        }

        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(17, 24, 21, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 400;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
        }

        .cart-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .cart-drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 380px;
            height: 100%;
            background: #ffffff;
            border-left: 2px solid #dfaa34;
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
            z-index: 500;
            display: flex;
            flex-direction: column;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cart-drawer.open {
            right: 0;
        }

        .cart-header {
            padding: 20px;
            border-bottom: 1px solid #e6dfcf;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #faf8f5;
        }

        .cart-header h3 {
            font-family: 'Cinzel', serif;
            font-size: 14px;
            color: #111815;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .cart-close-btn {
            background: transparent;
            border: none;
            color: #8c8575;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .cart-close-btn:hover {
            color: #ff3344;
        }

        .cart-items-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .empty-cart-text {
            text-align: center;
            color: #8c8575;
            font-size: 14px;
            font-style: italic;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #faf8f5;
            padding: 12px;
            border-radius: 0px;
            border: 1px solid #e6dfcf;
        }

        .cart-item-img {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 0px;
            border: 1px solid #e6dfcf;
            background: #ffffff;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-size: 13px;
            font-weight: 800;
            color: #111815;
            margin-bottom: 2px;
        }

        .cart-item-meta {
            font-size: 11px;
            color: #8c8575;
            margin-bottom: 2px;
        }

        .cart-item-price {
            font-family: 'Cinzel', serif;
            font-size: 12px;
            font-weight: 900;
            color: #dfaa34;
        }

        .remove-item-btn {
            background: transparent;
            border: none;
            color: #8c8575;
            cursor: pointer;
            padding: 5px;
            font-size: 15px;
            transition: 0.2s;
        }

        .remove-item-btn:hover {
            color: #ff3344;
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid #e6dfcf;
            background: #ffffff;
        }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .total-label {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            font-weight: 700;
            color: #8c8575;
            letter-spacing: 0.5px;
        }

        .total-amount {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            font-weight: 900;
            color: #dfaa34;
        }

        .checkout-btn {
            width: 100%;
            background: #25d366; 
            color: white;
            border: none;
            padding: 14px;
            border-radius: 0px;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .checkout-btn:hover {
            background: #1fba58;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.2);
        }

        @media (max-width: 600px) {
            .hero-folder { padding: 45px 6%; margin-bottom: 30px; }
            .hero-folder h2 { font-size: 1.6rem; letter-spacing: 1.5px; }
            .hero-folder p { font-size: 13px; }
            .promo-badge { font-size: 9px; padding: 4px 10px; }
            main { padding: 0 4% 40px 4%; }
            .product-card { padding: 18px; }
            .img-container { height: 350px; margin-bottom: 18px; }
            .product-name { font-size: 19px; }
            .product-price { font-size: 17px; margin-bottom: 18px; }
            .color-dot { width: 30px; height: 30px; }
            .color-selector { padding: 8px; gap: 8px; margin-bottom: 18px; }
            .model-select { padding: 13px; font-size: 12px; }
            .order-btn { padding: 13px; font-size: 12px; }
            .lightbox-close { top: auto; bottom: -65px; right: 50%; transform: translateX(50%); }
            
            .cart-drawer {
                width: 100%;
                right: -100%;
            }
            .cart-floating-btn {
                bottom: 15px;
                right: 15px;
                width: 52px;
                height: 52px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.jpg" alt="Logo" class="logo-img">
            <span class="logo-text">GOYARD</span>
        </div>
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Home</a>
    </header>

    <div class="hero-folder">
        <div class="promo-badge"><i class="fa-solid fa-crown"></i> AUTHENTIQUE HAUTE QUALITÉ</div>
        <h2>GOYARDINE COLLECTION</h2>
        <p>Découvrez l'élégance intemporelle de la Maison Goyard : <strong>Protection d'exception et motif Chevron gravé pour votre smartphone</strong></p>
    </div>

    <main>
        <div class="single-product-container" id="goyard-exclusive-container"></div>
    </main>

    <button class="cart-floating-btn" onclick="toggleCart()">
        <i class="fa-solid fa-shopping-cart"></i>
        <div class="cart-badge" id="cart-count">0</div>
    </button>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h3><i class="fa-solid fa-shopping-cart"></i> Mon Panier</h3>
            <button class="cart-close-btn" onclick="toggleCart()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="cart-items-container" id="cart-items-list"></div>
        <div class="cart-footer">
            <div class="cart-total-row">
                <span class="total-label">Total:</span>
                <span class="total-amount" id="cart-total-price">0 DH</span>
            </div>
            <button class="checkout-btn" onclick="sendCartToWhatsApp()">
                <i class="fa-brands fa-whatsapp"></i> Envoyer la commande
            </button>
        </div>
    </div>

    <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox(event)">
        <div class="lightbox-container">
            <button class="lightbox-close" onclick="forceCloseLightbox()"><i class="fa-solid fa-xmark"></i></button>
            <img src="" alt="Preview" id="lightbox-img" class="lightbox-img">
        </div>
    </div>

    <script>
        const MY_WHATSAPP_NUMBER = "+212 619-517752"; 

        const productsData = [
            {
                id: "MAISON-GOYARD-1853",
                // تم حصر الموديلات المطلوبة فقط هنا
                models: [
                    "iPhone 11", 
                    "iPhone 13", 
                    "iPhone 13 Pro Max", 
                    "iPhone 14", 
                    "iPhone 14 Pro", 
                    "iPhone 15 Pro",
                    "iPhone 16",
                    "iPhone 17"
                ],
                // تم تعديل مسار الصور بالترتيب التسلسلي go1.jpg إلى go8.jpg
                variants: [
                    { colorName: "Goyardine Carbon Matte Black", price: "80 DH", colorHex: "#141414", img: "go1.jpg" },
                    { colorName: "Goyardine Olive Green", price: "80 DH", colorHex: "#555d42", img: "go2.jpg" },
                    { colorName: "Goyardine Emerald Green", price: "80 DH", colorHex: "#094c36", img: "go3.jpg" },
                    { colorName: "Goyardine Classic Orange Edition", price: "80 DH", colorHex: "#c96823", img: "go4.jpg" },
                    { colorName: "Goyardine Elegant Grey", price: "80 DH", colorHex: "#838c91", img: "go5.jpg" },
                    { colorName: "Goyardine Luxury Ivory White", price: "80 DH", colorHex: "#e3dac9", img: "go6.jpg" },
                    { colorName: "Goyardine Royal Blue Velvet", price: "80 DH", colorHex: "#1e378b", img: "go7.jpg" },
                    { colorName: "Goyardine Soft Pastel Pink", price: "80 DH", colorHex: "#e6a3ab", img: "go8.jpg" }
                ]
            }
        ];

        let shoppingCart = JSON.parse(localStorage.getItem('my_mh_cart')) || [];
        const gridContainer = document.getElementById('goyard-exclusive-container');
        
        productsData.forEach((product, cardIndex) => {
            let optionsHTML = "";
            product.models.forEach(model => { optionsHTML += `<option value="${model}">${model}</option>`; });

            let colorsHTML = "";
            product.variants.forEach((variant, vIndex) => {
                const activeClass = vIndex === 0 ? "active" : "";
                colorsHTML += `
                    <div class="color-dot ${activeClass}" 
                         style="background-color: ${variant.colorHex}" 
                         data-colorname="${variant.colorName}" 
                         data-price="${variant.price}"
                         data-img="${variant.img}" 
                         onclick="changeColor(this, ${cardIndex})">
                    </div>`;
            });

            const defaultVariant = product.variants[0];

            const cardHTML = `
                <div class="product-card" 
                     id="card-${cardIndex}"
                     data-selected-color="${defaultVariant.colorName}" 
                     data-selected-price="${defaultVariant.price}"
                     data-selected-img="${defaultVariant.img}">
                    <div class="img-container" ondblclick="openLightboxFromCard(${cardIndex})">
                        <img id="product-img-${cardIndex}" src="${defaultVariant.img}" alt="${defaultVariant.colorName}">
                    </div>
                    <div class="product-info">
                        <div class="product-sku">Maison No: ${product.id}</div>
                        <div id="product-name-${cardIndex}" class="product-name">${defaultVariant.colorName}</div>
                        <div id="product-price-${cardIndex}" class="product-price">${defaultVariant.price}</div>
                        
                        <div class="color-selector">
                            ${colorsHTML}
                        </div>

                        <div class="model-select-container">
                            <select id="select-${cardIndex}" class="model-select">${optionsHTML}</select>
                        </div>

                        <button class="order-btn" onclick="addToCart(${cardIndex}, '${product.id}')">
                            <i class="fa-solid fa-cart-plus"></i> Add to Cart
                        </button>
                    </div>
                </div>
            `;
            gridContainer.innerHTML += cardHTML;
        });

        updateCartUI();

        function changeColor(dotElement, cardIndex) {
            const card = dotElement.closest('.product-card');
            card.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
            dotElement.classList.add('active');

            const newImgSrc = dotElement.getAttribute('data-img');
            const newName = dotElement.getAttribute('data-colorname');
            const newPrice = dotElement.getAttribute('data-price');

            document.getElementById(`product-img-${cardIndex}`).src = newImgSrc;
            document.getElementById(`product-name-${cardIndex}`).innerText = newName;
            document.getElementById(`product-price-${cardIndex}`).innerText = newPrice;

            card.setAttribute('data-selected-color', newName);
            card.setAttribute('data-selected-price', newPrice);
            card.setAttribute('data-selected-img', newImgSrc);
        }

        function openLightboxFromCard(cardIndex) {
            const currentImgSrc = document.getElementById(`product-img-${cardIndex}`).src;
            openLightbox(currentImgSrc);
        }

        function openLightbox(imageSrc) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = imageSrc;
            lightbox.classList.add('active');
        }

        function closeLightbox(event) {
            const container = document.querySelector('.lightbox-container');
            if (!container.contains(event.target)) { forceCloseLightbox(); }
        }

        function forceCloseLightbox() { document.getElementById('lightbox').classList.remove('active'); }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('open');
            document.getElementById('cart-overlay').classList.toggle('active');
        }

        function addToCart(cardIndex, productId) {
            const card = document.getElementById(`card-${cardIndex}`);
            const selectedColorName = card.getAttribute('data-selected-color');
            const selectedPriceText = card.getAttribute('data-selected-price');
            const selectedImg = card.getAttribute('data-selected-img');
            const selectElement = document.getElementById(`select-${cardIndex}`);
            const selectedModel = selectElement.value;
            
            const priceNumber = parseInt(selectedPriceText.replace(/[^0-9]/g, ''));
            
            const cartItem = {
                id: productId,
                name: selectedColorName,
                price: priceNumber,
                priceText: selectedPriceText,
                model: selectedModel,
                img: selectedImg
            };

            shoppingCart.push(cartItem);
            localStorage.setItem('my_mh_cart', JSON.stringify(shoppingCart));

            updateCartUI();
            toggleCart();
        }

        function removeItem(index) {
            shoppingCart.splice(index, 1);
            localStorage.setItem('my_mh_cart', JSON.stringify(shoppingCart));
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = shoppingCart.length;
            const itemsContainer = document.getElementById('cart-items-list');
            itemsContainer.innerHTML = "";

            if (shoppingCart.length === 0) {
                itemsContainer.innerHTML = `<p class="empty-cart-text">Votre panier est vide.</p>`;
                document.getElementById('cart-total-price').innerText = "0 DH";
                return;
            }

            let totalSum = 0;
            shoppingCart.forEach((item, index) => {
                totalSum += item.price;
                itemsContainer.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" class="cart-item-img">
                        <div class="cart-item-details">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-meta">Modèle: ${item.model}</div>
                            <div class="cart-item-price">${item.priceText}</div>
                        </div>
                        <button class="remove-item-btn" onclick="removeItem(${index})"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
            });
            document.getElementById('cart-total-price').innerText = totalSum + " DH";
        }

        function sendCartToWhatsApp() {
            if (shoppingCart.length === 0) { alert("Votre panier est vide !"); return; }
            
            let message = `Bonjour My MH phone case, I want to order these luxury items:\n\n`;
            let total = 0;
            
            shoppingCart.forEach((item, index) => {
                total += item.price;
                const fullImgUrl = window.location.origin + window.location.pathname.replace(/[^\/]*$/, '') + item.img;
                
                message += `🔹 *Item #${index + 1}:*\n• 📦 *Brand / Design:* ${item.name}\n• 📱 *Model:* ${item.model}\n• 💰 *Price:* ${item.priceText}\n• 🔢 *Collection:* [ ${item.id} ]\n• 📸 *Link:* ${fullImgUrl}\n\n`;
            });
            
            message += `-----------------------------------------\n🏆 *Total Order Amount:* ${total} DH\n-----------------------------------------`;
            
            window.open(`https://wa.me/${MY_WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
