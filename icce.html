<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <!-- Google tag (gtag.js) --> <script async src="https://www.googletagmanager.com/gtag/js?id=G-JY9C9J5R11"></script> <script> window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-JY9C9J5R11'); </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Accessories | MH phone case</title>
    <link rel="preload" href="iphone14.html" as="document">
    <link rel="preload" href="iphone15.html" as="document">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=500;150;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #ffffff; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #222222;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: #1a0b0b; 
            border-bottom: 2px solid #e11d48; 
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-size: 16px;
            font-weight: 800;
            color: #e11d48; 
            letter-spacing: 0.5px;
        }

        .back-btn {
            color: #ffffff;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 30px;
            background: #2e1216;
            border: 1px solid #e11d48;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: #ffffff;
            background: #e11d48;
            box-shadow: 0 0 15px rgba(225, 29, 72, 0.4);
        }

        main {
            flex: 1;
            padding: 30px 5%;
            background: #fffdfd; 
        }

        .collection-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .collection-tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #e11d48;
            font-weight: 800;
            margin-bottom: 5px;
            display: block;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1f080a;
            letter-spacing: -0.5px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .product-card {
            background: #ffffff;
            border: 1px solid #f3e8e9;
            border-radius: 24px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.01);
            height: 100%; 
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #e11d48;
            box-shadow: 0 12px 25px rgba(225, 29, 72, 0.08);
        }

        .img-container {
            width: 100%;
            height: 280px; 
            border-radius: 18px;
            overflow: hidden;
            background: #fff5f5;
            margin-bottom: 12px;
            position: relative;
            cursor: zoom-in;
        }

        .img-container::before {
            content: 'Double Tap to Zoom';
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(46, 18, 22, 0.95);
            color: #ffffff;
            font-size: 10px;
            padding: 5px 14px;
            border-radius: 20px;
            opacity: 0;
            transition: 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
            z-index: 10;
            border: 1px solid #e11d48;
        }

        .img-container:hover::before {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
            transition: transform 0.4s ease;
        }

        .img-container:hover img {
            transform: scale(1.04);
        }

        .product-info {
            display: flex;
            flex-direction: column;
            text-align: left;
            flex-grow: 1; 
        }

        .product-price {
            font-size: 16px;
            font-weight: 800;
            color: #e11d48;
            margin-bottom: 16px;
            margin-top: 8px;
        }

        .actions-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .order-btn {
            background: #1a0b0b;
            color: #ffffff;
            border: 1px solid #1a0b0b;
            text-decoration: none;
            padding: 11px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.3s;
            cursor: pointer;
            width: 100%;
        }

        .order-btn:hover {
            background: #e11d48;
            border-color: #e11d48;
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.2);
        }

        .add-to-cart-btn {
            background: #ffffff;
            color: #1a0b0b;
            border: 1px solid #e2d4d5;
            padding: 11px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
            width: 100%;
        }

        .add-to-cart-btn:hover {
            background: #fffdfd;
            border-color: #1a0b0b;
        }

        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(46, 18, 22, 0.95); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-container {
            position: relative;
            max-width: 90%;
            max-height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lightbox-overlay.active .lightbox-container {
            transform: scale(1);
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 20px;
            object-fit: contain;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid #e11d48;
        }

        .lightbox-close {
            position: absolute;
            top: -45px;
            right: 0;
            background: #e11d48;
            color: #ffffff;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .lightbox-close:hover {
            background: #ffffff;
            color: #1a0b0b;
            transform: rotate(90deg);
        }

        .cart-floating-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #1a0b0b;
            color: #ffffff;
            border: 1px solid #e11d48;
            outline: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 25px rgba(225, 29, 72, 0.2);
            z-index: 99;
            transition: 0.3s ease;
        }

        .cart-floating-btn:hover {
            transform: scale(1.05);
            background: #e11d48;
        }

        .cart-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #ffffff;
            color: #1a0b0b;
            font-size: 11px;
            font-weight: 800;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #e11d48;
        }

        .cart-overlay-drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 400;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
        }

        .cart-overlay-drawer.active {
            opacity: 1;
            pointer-events: auto;
        }

        .cart-drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 360px;
            height: 100%;
            background: #ffffff;
            border-left: 1px solid #f3e8e9;
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
            z-index: 500;
            display: flex;
            flex-direction: column;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cart-drawer.open {
            right: 0;
        }

        .cart-header {
            padding: 20px;
            border-bottom: 1px solid #f3e8e9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a0b0b;
            color: #ffffff;
        }

        .cart-header h3 {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cart-header h3 i {
            color: #e11d48;
        }

        .cart-close-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .cart-close-btn:hover {
            color: #e11d48;
        }

        .cart-items-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #fffdfd;
        }

        .empty-cart-text {
            text-align: center;
            color: #8c7375;
            font-size: 13px;
            font-style: italic;
            margin-top: 20px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #ffffff;
            padding: 10px;
            border-radius: 16px;
            border: 1px solid #f3e8e9;
        }

        .cart-item-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #f3e8e9;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-price {
            font-size: 14px;
            font-weight: 800;
            color: #e11d48;
        }

        .remove-item-btn {
            background: transparent;
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            padding: 5px;
            font-size: 14px;
            transition: 0.2s;
        }

        .remove-item-btn:hover {
            color: #ef4444;
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid #f3e8e9;
            background: #ffffff;
        }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .total-label {
            font-size: 12px;
            font-weight: 700;
            color: #8c7375;
            text-transform: uppercase;
        }

        .total-amount {
            font-size: 16px;
            font-weight: 800;
            color: #1f080a;
        }

        .checkout-btn {
            width: 100%;
            background: #25d366; 
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 150;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        .checkout-btn:hover {
            background: #1fba58;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
        }

        @media (max-width: 600px) {
            main { padding: 20px 4%; }
            .page-title { font-size: 1.8rem; }
            
            .products-grid {
                grid-template-columns: repeat(2, 1fr); 
                gap: 12px; 
            }

            .product-card { padding: 8px; border-radius: 18px; }
            .img-container { height: 190px; border-radius: 14px; margin-bottom: 8px; }
            
            .img-container::before {
                content: 'Tap 2x to View'; 
                font-size: 9px;
                padding: 3px 8px;
            }

            .product-price { font-size: 14px; margin-bottom: 12px; }
            .actions-row { gap: 6px; }
            .order-btn, .add-to-cart-btn { padding: 8px; font-size: 11px; border-radius: 10px; }

            .lightbox-close {
                top: auto;
                bottom: -55px;
                right: 50%;
                transform: translateX(50%);
            }
            .cart-drawer { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <span class="logo-text">MH Accessories</span>
        </div>
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Home</a>
    </header>

    <main>
        <div class="collection-header">
            <span class="collection-tag">Premium Essentials</span>
            <h1 class="page-title">Essential Phone Accessories</h1>
        </div>

        <div class="products-grid" id="special-grid-container"></div>
    </main>

    <button class="cart-floating-btn" onclick="toggleCart()">
        <i class="fa-solid fa-shopping-cart"></i>
        <div class="cart-badge" id="cart-count">0</div>
    </button>

    <div class="cart-overlay-drawer" id="cart-overlay-drawer" onclick="toggleCart()"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h3><i class="fa-solid fa-shopping-cart"></i> Mon Panier</h3>
            <button class="cart-close-btn" onclick="toggleCart()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="cart-items-container" id="cart-items-list"></div>
        <div class="cart-footer">
            <div class="cart-total-row">
                <span class="total-label">Total:</span>
                <span class="total-amount" id="cart-total-price">0 DH</span>
            </div>
            <button class="checkout-btn" onclick="sendCartToWhatsApp()">
                <i class="fa-brands fa-whatsapp"></i> Envoyer la commande
            </button>
        </div>
    </div>

    <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox(event)">
        <div class="lightbox-container">
            <button class="lightbox-close" onclick="forceCloseLightbox()"><i class="fa-solid fa-xmark"></i></button>
            <img src="" alt="Preview" id="lightbox-img" class="lightbox-img">
        </div>
    </div>

    <script>
        const MY_WHATSAPP_NUMBER = "212619517752";

        // مصفوفة المنتجات بالثمن والصورة فقط
        const productsData = [
            { price: "15 DH", image: "acc1.jpg" },
            { price: "15 DH", image: "acc2.jpg" },
            { price: "15 DH", image: "acc3.jpg" },
            { price: "15 DH", image: "acc4.jpg" },
            { price: "15 DH", image: "acc5.jpg" },
            { price: "15 DH", image: "acc6.jpg" }
        ];

        let shoppingCart = JSON.parse(localStorage.getItem('my_mh_cart')) || [];
        const gridContainer = document.getElementById('special-grid-container');
        
        productsData.forEach((product, index) => {
            const cardHTML = `
                <div class="product-card" id="product-card-${index}">
                    <div class="img-container" ondblclick="openLightbox('${product.image}')">
                        <img src="${product.image}" alt="Accessory Image">
                    </div>
                    <div class="product-info">
                        <div class="product-price">${product.price}</div>
                        <div class="actions-row">
                            <button class="order-btn" onclick="handleOrder(${index}, '${product.image}')">
                                <i class="fa-brands fa-whatsapp"></i> Order Now
                            </button>
                            <button class="add-to-cart-btn" onclick="addToCartDirect(${index})">
                                <i class="fa-solid fa-cart-plus"></i> Add To Cart
                            </button>
                        </div>
                    </div>
                </div>
            `;
            gridContainer.innerHTML += cardHTML;
        });

        updateCartUI();

        function openLightbox(imageSrc) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = imageSrc;
            lightbox.classList.add('active');
        }

        function closeLightbox(event) {
            const container = document.querySelector('.lightbox-container');
            if (!container.contains(event.target)) {
                forceCloseLightbox();
            }
        }

        function forceCloseLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function handleOrder(index, productImage) {
            const fullImageUrl = window.location.origin + window.location.pathname.replace(/[^\/]*$/, '') + productImage;
            
            const message = `Hello MH phone case, I want to order this accessory:\n\n` +
                            `📸 *Product Image:* ${fullImageUrl}\n\n` +
                            `💰 *Price:* ${productsData[index].price}`;
            window.open(`https://wa.me/${MY_WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function addToCartDirect(index) {
            const product = productsData[index];
            const priceNum = parseInt(product.price.replace(/[^\d]/g, '')) || 0;

            const itemObject = {
                price: priceNum,
                priceText: product.price,
                img: product.image
            };

            shoppingCart.push(itemObject);
            localStorage.setItem('my_mh_cart', JSON.stringify(shoppingCart));
            updateCartUI();
            toggleCart(); 
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('open');
            document.getElementById('cart-overlay-drawer').classList.toggle('active');
        }

        function removeItem(index) {
            shoppingCart.splice(index, 1);
            localStorage.setItem('my_mh_cart', JSON.stringify(shoppingCart));
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = shoppingCart.length;
            const itemsContainer = document.getElementById('cart-items-list');
            itemsContainer.innerHTML = "";

            if (shoppingCart.length === 0) {
                itemsContainer.innerHTML = `<p class="empty-cart-text">Votre panier est vide.</p>`;
                document.getElementById('cart-total-price').innerText = "0 DH";
                return;
            }

            let total = 0;
            shoppingCart.forEach((item, index) => {
                total += item.price;
                itemsContainer.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" class="cart-item-img">
                        <div class="cart-item-details">
                            <div class="cart-item-price">${item.priceText || (item.price + " DH")}</div>
                        </div>
                        <button class="remove-item-btn" onclick="removeItem(${index})"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
            });

            document.getElementById('cart-total-price').innerText = total + " DH";
        }

        function sendCartToWhatsApp() {
            if (shoppingCart.length === 0) return;
            
            let message = `Bonjour MH phone case, I want to order these items from Accessories Collection:\n\n`;
            let total = 0;
            
            shoppingCart.forEach((item, index) => {
                total += item.price;
                const baseUrl = window.location.origin + window.location.pathname.replace(/[^\/]*$/, '');
                const fullImageUrl = baseUrl + item.img;
                
                message += `🔹 *Item #${index + 1}:*\n• 💰 *Price:* ${item.priceText || (item.price + " DH")}\n• 📸 *Image Link:* ${fullImageUrl}\n\n`;
            });
            
            message += `-----------------------------------------\n`;
            message += `🏆 *Total Amount:* ${total} DH\n`;
            message += `-----------------------------------------`;
            
            window.open(`https://wa.me/${MY_WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
