    font-weight: 600;

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #d4af37;
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.08);
        }

        .img-container {
            width: 100%;
            height: 280px; 
            border-radius: 18px;
            overflow: hidden;
            background: #faf6ee;
            margin-bottom: 12px;
            position: relative;
            cursor: zoom-in;
        }

        .img-container::before {
            content: 'Double Tap to Zoom';
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(17, 17, 17, 0.9);
            color: #d4af37;
            font-size: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            opacity: 0;
            transition: 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
            z-index: 10;
            border: 1px solid #d4af37;
        }

        .img-container:hover::before {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
            transition: transform 0.4s ease;
        }

        .img-container:hover img {
            transform: scale(1.03);
        }

        .product-info {
            display: flex;
            flex-direction: column;
            text-align: left;
            flex-grow: 1; 
        }

        .product-sku {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            color: #8c8575;
            font-weight: 700;
            margin-bottom: 10px; 
            letter-spacing: 1px;
        }

        .product-price {
            font-size: 14px;
            font-weight: 700;
            color: #b3922e;
            margin-bottom: 12px;
        }

            margin-bottom: 12px;
            position: relative;
            margin-top: auto; 
        }

        .model-select {
            width: 100%;
            padding: 9px 12px;
            background: #ffffff;
            border: 1px solid #eedfc2;
            border-radius: 12px;
            color: #4a4a4a;
            font-size: 12px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            appearance: none; 
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        .model-select:focus {
            border-color: #d4af37;
        }

            content: '\f107'; 
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;

            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #d4af37;
            pointer-events: none;
            font-size: 12px;
        }

            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;

            align-items: center;

            color: #111111;

            color: #111111;

            height: 20px;
            border-radius: 50%;

            justify-content: center;
            align-items: center;
            border: 1px solid #d4af37;

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);

            -webkit-backdrop-filter: blur(4px);
            z-index: 400;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
        }

            opacity: 1;
            pointer-events: auto;
        }

            top: 0;
            right: -100%;

            font-weight: 700;
            text-transform: uppercase;

            border: none;
            color: #d4af37;
            font-size: 20px;
            cursor: pointer;

        .cart-close-btn:hover {

        .cart-items-container {

            flex-direction: column;
            gap: 15px;

            background: #ffffff;

            border: 1px solid #eedfc2;

            font-weight: 700;
            color: #111111;
            margin-bottom: 2px;

            color: #666666;

        }

        .cart-item-price {
            font-size: 12px;
            font-weight: 700;
            color: #b3922e;

            background: transparent;
            border: none;
            color: #909090;
            cursor: pointer;
            padding: 5px;
            font-size: 14px;
            transition: 0.2s;

        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid #eedfc2;
            background: #ffffff;
        }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .total-label {
            font-size: 12px;
            font-weight: 700;
            color: #666666;
            text-transform: uppercase;

        .total-amount {
            font-size: 16px;
            font-weight: 700;
            color: #111111;

            border: none;
            padding: 12px;

            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        .checkout-btn:hover {
            background: #1fba58;
        }

        @media (max-width: 600px) {
            main { padding: 20px 4%; }
            .page-title { font-size: 1.8rem; }
            
            .products-grid {
                grid-template-columns: repeat(2, 1fr); 
                gap: 12px; 
            }

            .product-card { padding: 8px; border-radius: 18px; }
            .img-container { height: 190px; border-radius: 14px; margin-bottom: 8px; }
            
            .img-container::before {
                content: 'Tap 2x to View'; 
                font-size: 9px;
                padding: 3px 8px;
            }

            .product-price { font-size: 12px; margin-bottom: 8px; }
            .model-select { padding: 7px 24px 7px 10px; font-size: 11px; border-radius: 10px; }
            .actions-row { gap: 6px; }
            .order-btn, .add-to-cart-btn { padding: 8px; font-size: 11px; border-radius: 10px; }

            .lightbox-close {
                top: auto;
                bottom: -55px;
                right: 50%;
                transform: translateX(50%);
            }
            .cart-drawer { width: 100%; }
        }

            { id: "SPC-032", price: "80 DH", image: "ot32.jpg", models: ["iPhone 11","iPhone 12 Pro Max","iPhone 13","iPhone 13 Pro","iPhone 14","iPhone 14 Pro","iPhone 15","iPhone 15 Pro","iPhone 15 Pro Max"] },
            { id: "SPC-033", price: "90 DH", image: "ot33.jpg", models: ["iPhone 11","iPhone 11 Pro Max","iPhone 11 Pro","iPhone 12 Pro","iPhone 12","iPhone 14","iPhone 13","iPhone 13 Pro","iPhone 13 Pro Max","iPhone 15","iPhone 15 Pro Max","iPhone 15 Pro","iPhone 14 Pro","iPhone 12 Pro Max","iPhone 14 Pro Max","iPhone 16 Pro Max","iPhone 16 Pro","iPhone 17 Pro Max","iPhone 17","iPhone 17 Pro"] },
            { id: "SPC-034", price: "90 DH", image: "ot34.jpg", models: ["iPhone 13","iPhone 14","iPhone 15 Pro"] },
            { id: "SPC-035", price: "90 DH", image: "ot35.jpg", models: ["iPhone 12","iPhone 12 Pro","iPhone 12 Pro Max","iPhone 13","iPhone 13 Pro","iPhone 13 Pro Max","iPhone 14","iPhone 14 Pro","iPhone 14 Pro Max","iPhone 15","iPhone 15 Pro","iPhone 15 Pro Max","iPhone 16","iPhone 16 Pro","iPhone 16 Pro Max","iPhone 17","iPhone 17 Pro","iPhone 17 Pro Max"] },
            { id: "SPC-036", price: "90 DH", image: "ot36.jpg", models: ["iPhone 12","iPhone 12 Pro","iPhone 12 Pro Max","iPhone 13","iPhone 13 Pro","iPhone 13 Pro Max","iPhone 14","iPhone 14 Pro","iPhone 14 Pro Max","iPhone 15","iPhone 15 Pro","iPhone 15 Pro Max","iPhone 16","iPhone 16 Pro","iPhone 16 Pro Max","iPhone 17","iPhone 17 Pro","iPhone 17 Pro Max"] },
            { id: "SPC-037", price: "90 DH", image: "ot37.jpg", models: ["iPhone 12","iPhone 12 Pro","iPhone 12 Pro Max","iPhone 13","iPhone 13 Pro","iPhone 13 Pro Max","iPhone 14","iPhone 14 Pro","iPhone 14 Pro Max","iPhone 15","iPhone 15 Pro","iPhone 15 Pro Max","iPhone 16","iPhone 16 Pro","iPhone 16 Pro Max","iPhone 17","iPhone 17 Pro","iPhone 17 Pro Max"] },
            { id: "SPC-038", price: "90 DH", image: "ot38.jpg", models: ["iPhone 12","iPhone 12 Pro","iPhone 12 Pro Max","iPhone 13","iPhone 13 Pro","iPhone 13 Pro Max","iPhone 14","iPhone 14 Pro","iPhone 14 Pro Max","iPhone 15","iPhone 15 Pro","iPhone 15 Pro Max","iPhone 16","iPhone 16 Pro","iPhone 16 Pro Max","iPhone 17","iPhone 17 Pro","iPhone 17 Pro Max"] },
            { id: "SPC-039", price: "80 DH", image: "ot39.jpg", models: ["iPhone 11","iPhone 12 Pro Max","iPhone 13","iPhone 13 Pro","iPhone 14","iPhone 14 Pro","iPhone 15","iPhone 15 Pro","iPhone 15 Pro Max"] },
            { id: "SPC-040", price: "80 DH", image: "ot40.jpg", models: ["iPhone 11","iPhone 12 Pro Max","iPhone 13","iPhone 13 Pro","iPhone 14","iPhone 14 Pro","iPhone 15","iPhone 15 Pro","iPhone 15 Pro Max"] }
        ];

        let shoppingCart = JSON.parse(localStorage.getItem('my_mh_cart')) || [];
        const gridContainer = document.getElementById('special-grid-container');
        
        // حلقة لبناء واجهة المنتجات وكروت العرض
        productsData.forEach((product, index) => {
            if (product.status === "hidden") return;

            let optionsHTML = "";
            product.models.forEach(model => { 
                // توحيد شكل النصوص المكتوبة لتظهر بشكل جميل
                const formattedModel = model.trim().replace(/^iphone/i, 'iPhone');
                optionsHTML += `<option value="${formattedModel}">${formattedModel}</option>`; 
            });

            const cardHTML = `
                <div class="product-card" id="product-card-${index}">
                    <div class="img-container" ondblclick="openLightbox('${product.image}')">
                        <img src="${product.image}" alt="Phone Case">
                    </div>
                    <div class="product-info">
                        <div class="product-sku">Code: ${product.id}</div>
                        <div class="product-price">${product.price}</div>
                        <div class="model-select-container">
                            <select id="select-${index}" class="model-select">${optionsHTML}</select>
                        </div>
                        <div class="actions-row">
                            <button class="order-btn" onclick="handleOrder(${index}, '${product.id}', '${product.image}')">
                                <i class="fa-brands fa-whatsapp"></i> Order Now
                            </button>
                            <button class="add-to-cart-btn" onclick="addToCartDirect(${index})">
                                <i class="fa-solid fa-cart-plus"></i> Add To Cart
                            </button>
                        </div>
                    </div>
                </div>
            `;
            gridContainer.innerHTML += cardHTML;
        });

        // --- توليد خيارات الفلتر تلقائياً من موديلات المنتجات المتاحة ---
        const uniqueModelsSet = new Set();
        productsData.forEach(p => {
            if (p.status !== "hidden") {
                p.models.forEach(m => {
                    // جعل الحرف الأول كبير لإلغاء أي تكرار ناتج عن الحروف الكبيرة والصغيرة في المصفوفة
                    const fixedName = m.trim().replace(/^iphone/i, 'iPhone');
                    uniqueModelsSet.add(fixedName);
                });
            }
        });

        // ترتيب أسماء الهواتف منطقياً قبل وضعها في الفلتر
        const sortedModels = Array.from(uniqueModelsSet).sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
        const mainFilterSelect = document.getElementById('main-phone-filter');
        sortedModels.forEach(model => {
            mainFilterSelect.innerHTML += `<option value="${model}">${model}</option>`;
        });

        // --- دالة الفلترة الذكية ---
        function filterProductsByPhone() {
            const selectedModel = document.getElementById('main-phone-filter').value;
            
            productsData.forEach((product, index) => {
                const card = document.getElementById(`product-card-${index}`);
                if (!card) return;

                // تحويل الموديلات داخل المنتج الحالي لنفس الصيغة الموحدة للمقارنة
                const cleanProductModels = product.models.map(m => m.trim().replace(/^iphone/i, 'iPhone'));

                if (selectedModel === "all") {
                    card.style.display = "flex";
                } else {
                    if (cleanProductModels.includes(selectedModel)) {
                        card.style.display = "flex";
                        // تحويل خيار المنتج الداخلي تلقائياً ليتوافق مع اختيار الفلتر العلوي
                        const cardSelect = document.getElementById(`select-${index}`);
                        if (cardSelect) cardSelect.value = selectedModel;
                    } else {
                        card.style.display = "none";
                    }
                }
            });
        }

        // تحضير الـ UI للسلة عند بدء تحميل الصفحة
        updateCartUI();

        function openLightbox(imageSrc) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = imageSrc;
            lightbox.classList.add('active');
        }

        function closeLightbox(event) {
            const container = document.querySelector('.lightbox-container');
            if (!container.contains(event.target)) {
                forceCloseLightbox();
            }
        }

        function forceCloseLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function handleOrder(index, productId, productImage) {
            const selectElement = document.getElementById(`select-${index}`);
            const selectedModel = selectElement ? selectElement.value : "Default Model";
            const fullImageUrl = window.location.origin + window.location.pathname.replace(/[^\/]*$/, '') + productImage;
            
            const message = `Hello MH phone case, I want to order this special design:\n\n` +
                            `📸 *Product Image:* ${fullImageUrl}\n\n` +
                            `📱 *Phone Model:* ${selectedModel}\n` +
                            `🔢 *Product ID:* [ ${productId} ]`;
            window.open(`https://wa.me/${MY_WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function addToCartDirect(index) {
            const product = productsData[index];
            const selectElement = document.getElementById(`select-${index}`);
            const selectedModel = selectElement ? selectElement.value : "Default Model";
            
            const priceNum = parseInt(product.price.replace(/[^\d]/g, '')) || 0;

            const itemObject = {
                id: product.id,
                model: selectedModel,
                price: priceNum,
                priceText: product.price,
                img: product.image
            };

            shoppingCart.push(itemObject);
            localStorage.setItem('my_mh_cart', JSON.stringify(shoppingCart));
            updateCartUI();
            toggleCart(); 
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('open');
            document.getElementById('cart-overlay-drawer').classList.toggle('active');
        }

        function removeItem(index) {
            shoppingCart.splice(index, 1);
            localStorage.setItem('my_mh_cart', JSON.stringify(shoppingCart));
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = shoppingCart.length;
            const itemsContainer = document.getElementById('cart-items-list');
            itemsContainer.innerHTML = "";

            if (shoppingCart.length === 0) {
                itemsContainer.innerHTML = `<p class="empty-cart-text">Votre panier est vide.</p>`;
                document.getElementById('cart-total-price').innerText = "0 DH";
                return;
            }

            let total = 0;
            shoppingCart.forEach((item, index) => {
                total += item.price;
                itemsContainer.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" class="cart-item-img">
                        <div class="cart-item-details">
                            <div class="cart-item-name">Code: ${item.id}</div>
                            <div class="cart-item-meta">Modèle: ${item.model}</div>
                            <div class="cart-item-price">${item.priceText || (item.price + " DH")}</div>
                        </div>
                        <button class="remove-item-btn" onclick="removeItem(${index})"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
            });

            document.getElementById('cart-total-price').innerText = total + " DH";
        }

        function sendCartToWhatsApp() {
            if (shoppingCart.length === 0) return;
            
            let message = `Bonjour MH phone case, I want to order these items from Special Collection:\n\n`;
            let total = 0;
            
            shoppingCart.forEach((item, index) => {
                total += item.price;
                const baseUrl = window.location.origin + window.location.pathname.replace(/[^\/]*$/, '');
                const fullImageUrl = baseUrl + item.img;
                
                message += `🔹 *Item #${index + 1}:*\n• 📱 *Model:* ${item.model}\n• 💰 *Price:* ${item.priceText || (item.price + " DH")}\n• 🔢 *Code:* [ ${item.id} ]\n• 📸 *Image Link:* ${fullImageUrl}\n\n`;
            });
            
            message += `-----------------------------------------\n`;
            message += `🏆 *Total Amount:* ${total} DH\n`;
            message += `-----------------------------------------`;
            
            window.open(`https://wa.me/${MY_WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
